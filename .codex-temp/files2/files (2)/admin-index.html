<!DOCTYPE html>
<html lang="en" ng-app="medcoreAdmin">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEDCORE Admin</title>

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

  <!-- Admin Styles -->
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<div class="admin-layout">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="admin-sidebar">

    <div class="sidebar-logo">MEDCORE</div>

    <ul class="sidebar-nav" ng-controller="NavCtrl">
      <li>
        <a href="#!sales-invoices"
           ng-class="{ active: isActive('sales-invoices') }">
          <span class="nav-icon">🧾</span> Sales Invoices
        </a>
      </li>
      <li>
        <a href="#!users"
           ng-class="{ active: isActive('users') }">
          <span class="nav-icon">👥</span> Users
        </a>
      </li>
      <li>
        <a href="#!purchase-history"
           ng-class="{ active: isActive('purchase-history') }">
          <span class="nav-icon">📦</span> Purchase History
        </a>
      </li>
    </ul>

  </aside>

  <!-- ── Main (router injects views here) ────────────────── -->
  <main class="admin-main">
    <div ng-view></div>
  </main>

</div>

<!--
  LOAD ORDER — must follow this sequence:
  1. Module (defines the app)         ← FIRST
  2. Services (needed by controllers)
  3. Controllers (use services)       ← LAST
-->

<!-- 1. Module + Routes -->
<script src="admin.module.js"></script>

<!-- 2. Services -->
<script src="supabase-config.service.js"></script>
<script src="sales-invoices.service.js"></script>
<script src="users.service.js"></script>
<script src="purchase-history.service.js"></script>

<!-- 3. Controllers -->
<script src="nav.controller.js"></script>
<script src="sales-invoices.controller.js"></script>
<script src="users.controller.js"></script>
<script src="purchase-history.controller.js"></script>

</body>
</html>
