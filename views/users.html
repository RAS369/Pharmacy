<div class="admin-feature" ng-controller="UsersController">
    <h2 class="page-title">Users</h2>

    <div class="filters-bar">
        <input type="text" placeholder="Search by name or email..."
            ng-model="searchQuery" ng-change="onSearch()" />
    </div>

    <p class="error-msg" ng-if="errorMessage">{{ errorMessage }}</p>

    <div class="table-card">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Joined</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr class="loading-row" ng-if="loading">
                    <td colspan="6">Loading users...</td>
                </tr>
                <tr ng-if="!loading && users.length === 0">
                    <td colspan="6">
                        <div class="empty-state">
                            <p>No users found.</p>
                        </div>
                    </td>
                </tr>
                <tr ng-repeat="user in users" ng-if="!loading">
                    <td>#{{ user.id }}</td>
                    <td>{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.phone || '-' }}</td>
                    <td>{{ user.created_at | date:'dd/MM/yyyy' }}</td>
                    <td>
                        <button class="btn-icon" ng-click="startEdit(user)" title="Edit">Edit</button>
                        <button class="btn-icon" ng-click="deleteUser(user.id)" title="Delete">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="modal-overlay" ng-if="editingUser">
        <div class="modal-box">
            <h3>Edit User</h3>
            <div class="form-group">
                <label>Name</label>
                <input type="text" ng-model="editingUser.name" placeholder="Full name" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" ng-model="editingUser.email" placeholder="Email address" />
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" ng-model="editingUser.phone" placeholder="Phone number" />
            </div>
            <div class="modal-actions">
                <button class="btn-reset" ng-click="cancelEdit()">Cancel</button>
                <button class="btn-primary" ng-click="saveUser()">Save Changes</button>
            </div>
        </div>
    </div>
</div>
