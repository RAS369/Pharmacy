<style>
    .container h2,
    .container h1 {
        font-family: 'Playfair Display', serif !important;
        font-weight: 700 !important;
        color: var(--teal) !important;
        font-size: 2rem !important;
    }
</style>


<section class="container my-5">
    <h2 class="fw-bold mb-4">Admin Dashboard</h2>
    <div class="row">
         <div class="col-md-3">
    <div class="card border-0 shadow rounded-4 p-3 h-100">
      <div class="d-flex justify-content-between align-items-start">
        <span class="text-muted small">Total Inventory Value</span>
        <span class="text-success fs-4"><i class="fas fa-dollar-sign"></i></span>
      </div>
      <div class="fw-bold mt-2" style="font-size: 1.6rem;">Rs. 150 000.00</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 shadow rounded-4 p-3 h-100">
      <div class="d-flex justify-content-between align-items-start">
        <span class="text-muted small">Low Stock Items</span>
        <span class="text-danger fs-4"><i class="fas fa-triangle-exclamation"></i></span>
      </div>
      <div class="fw-bold mt-2 text-danger" style="font-size: 2.5rem;">{{ lowStockCount }}</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 shadow rounded-4 p-3 h-100">
      <div class="d-flex justify-content-between align-items-start">
        <span class="text-muted small">Expiring Soon</span>
        <span class="text-warning fs-4"><i class="fas fa-calendar-xmark"></i></span>
      </div>
      <div class="fw-bold mt-2 text-warning" style="font-size: 2.5rem;">{{ expiredCount || 0 }}</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 shadow rounded-4 p-3 h-100">
      <div class="d-flex justify-content-between align-items-start">
        <span class="text-muted small">Recent Transactions</span>
      </div>
      <ul class="mt-2 ps-3 small text-muted" style="line-height: 2;">
        <li>Received 50 'Ibuprofen'</li>
        <li>Dispensed 10 'Amoxicillin'</li>
        <li>Adjusted 2 'Aspirin'</li>
      </ul>
    </div>
  </div>
  <div class="card border-0 shadow rounded-4 p-4 mt-4">
  <h5 class="fw-bold mb-3">Inventory Value Over Time</h5>
  <img src="assets/img/chart.jpg" class="img-fluid rounded-3" style="width: 100%; height: 350px; object-fit: fill;">
</div>

</div>
</section>
