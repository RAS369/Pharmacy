<style>
    .register-bg {
        min-height: 100vh;
        background: linear-gradient(135deg, var(--teal) 0%, var(--navy) 60%, var(--green-dark) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: -120px;        
        padding-top: 130px;  
    }

    .register-card {
        background: white;
        border-radius: var(--radius-xl);
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 860px;
    }

    .register-img-side {
        background: var(--mint);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
    }

    .register-form-side {
        padding: 48px 40px;
    }

    .register-form-side h2 {
        font-family: 'Playfair Display', serif;
        color: var(--teal);
        font-weight: 800;
        margin-bottom: 28px;
        text-align: center;
    }

    .register-form-side .form-control {
        border-radius: 12px;
        border: 1.5px solid #e0ece7;
        padding: 12px 16px;
        font-size: 0.9rem;
        transition: var(--transition);
    }

    .register-form-side .form-control:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(103,192,144,0.2);
    }

    .register-form-side .form-label {
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--teal);
        margin-bottom: 6px;
    }

    .btn-register{
        background: var(--green);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 12px;
        font-weight: 600;
        font-size: 0.95rem;
        width: 100%;
        transition: var(--transition);
        margin-top: 8px;
    }

    .register-login:hover {
        background: var(--green-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(103,192,144,0.4);
    }

    .btn-register:disabled {
        background: #ccc;
        transform: none;
        box-shadow: none;
    }
</style>

<div class="register-bg">
    <div class="register-card d-flex flex-column flex-md-row">
        <div class="register-img-side col-md-6">
            <img src="assets/img/login.jpg" class="img-fluid" style="max-height:350px;">
        </div>
        <div class="register-form-side col-md-6">
            <h2>Welcome!</h2>
            <form name="registerForm" ng-submit="register()">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username"
                        ng-model="user.username" required placeholder="your username">
                    <span class="text-danger small"
                        ng-show="registerForm.username.$touched && registerForm.username.$invalid">
                        Username is required.
                    </span>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email"
                        ng-model="user.email" required placeholder="you@example.com">
                    <span class="text-danger small"
                        ng-show="registerForm.email.$touched && registerForm.email.$invalid">
                        Email is required.
                    </span>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password"
                        ng-model="user.password" required placeholder="••••••••">
                    <span class="text-danger small"
                        ng-show="registerForm.password.$touched && registerForm.password.$invalid">
                        Password is required.
                    </span>
                </div>

                <button type="submit" class="btn-register">
                    Register
                </button>

                <p class="text-center mt-3" style="font-size:0.88rem; color:var(--gray-text);">
                    Already have an account?
                    <a href="#!/login" style="color:var(--teal); font-weight:600;">Login</a>
                </p>

            </form>
        </div>

    </div>
</div>
